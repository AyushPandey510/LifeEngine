services:
  - type: web
    name: life-engine-api
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: life-engine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: life-engine-redis
          property: connectionString
      - key: FAISS_DIR
        value: /app/faiss_indexes
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_TIMEOUT_SECONDS
        value: 60
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small

  - type: keyvalue
    name: life-engine-redis
    plan: free
    ipAllowList: []

databases:
  - name: life-engine-db
    databaseName: lifeengine
    user: lifeengine
    plan: free
