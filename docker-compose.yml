# Docker Compose for Local Development
# Life Engine AI - Full Stack

version: '3.9'

services:
  # API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - faiss_data:/app/faiss_indexes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifeengine
      POSTGRES_PASSWORD: lifeengine_password
      POSTGRES_DB: lifeengine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeengine -d lifeengine"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker (Background Tasks)
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - faiss_data:/app/faiss_indexes
    depends_on:
      - db
      - redis
    restart: unless-stopped
    command: python -m celery -A app.workers.celery_app worker --loglevel=info

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - faiss_data:/app/faiss_indexes
    depends_on:
      - celery
    restart: unless-stopped
    command: python -m celery -A app.workers.celery_app beat --loglevel=info

  # pgAdmin4 - PostgreSQL Admin Interface
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lifeengine.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_SERVER_JSON: /pgadmin4/servers.json
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./backend/pgadmin_servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  faiss_data:
  pgadmin_data: